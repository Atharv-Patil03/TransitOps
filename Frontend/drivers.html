<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TransitOps Drivers — Driver management, performance metrics, and personnel tracking">
  <title>Drivers — TransitOps</title>
  <link rel="stylesheet" href="src/design-tokens.css">
  <link rel="stylesheet" href="src/styles.css">
  <style>
    .view-toggle {
      display: inline-flex;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 3px;
    }
    .view-toggle-btn {
      padding: 6px 10px;
      border-radius: var(--radius-md);
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--duration-normal) var(--ease-out);
    }
    .view-toggle-btn:hover { color: var(--text-primary); }
    .view-toggle-btn.active {
      background: var(--violet-gradient);
      color: white;
    }
    .driver-card-rating {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-1);
    }
    .driver-card-rating-value {
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: var(--amber-400);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside id="sidebar"></aside>
    <div class="main-wrapper">
      <header id="header" class="header"></header>
      <main class="main-content">
        <div class="page-header">
          <div class="page-header-info">
            <h1>Drivers</h1>
            <p>Manage your fleet personnel and performance metrics</p>
          </div>
          <div class="page-header-actions">
            <div class="view-toggle" id="viewToggle">
              <button class="view-toggle-btn active" data-view="grid" title="Grid view">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              </button>
              <button class="view-toggle-btn" data-view="table" title="Table view">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              </button>
            </div>
            <div class="input-field" style="min-width:200px">
              <span style="color:var(--text-tertiary)"><span data-icon="search"></span></span>
              <input type="text" placeholder="Search drivers..." id="driverSearch" />
            </div>
            <button class="btn-primary"><span data-icon="plus"></span> Add Driver</button>
          </div>
        </div>

        <!-- Summary KPIs -->
        <div class="kpi-grid mb-6">
          <div class="kpi-card">
            <div class="kpi-card-label">Total Drivers</div>
            <div class="kpi-card-value">956</div>
            <div class="kpi-card-footer">
              <span class="kpi-card-delta up"><span data-icon="trendUp"></span> +12</span>
              <span class="text-xs text-tertiary">this month</span>
            </div>
          </div>
          <div class="kpi-card">
            <div class="kpi-card-label">Active Now</div>
            <div class="kpi-card-value">712</div>
            <div class="kpi-card-footer">
              <span class="status-pill active">On Duty</span>
            </div>
          </div>
          <div class="kpi-card">
            <div class="kpi-card-label">Avg. Rating</div>
            <div class="kpi-card-value">4.7</div>
            <div class="kpi-card-footer">
              <span class="star-rating" style="color:var(--amber-400)"><span data-icon="star"></span><span data-icon="star"></span><span data-icon="star"></span><span data-icon="star"></span><span data-icon="star"></span></span>
            </div>
          </div>
          <div class="kpi-card">
            <div class="kpi-card-label">Avg. On-Time</div>
            <div class="kpi-card-value">95.1<span class="kpi-card-unit">%</span></div>
            <div class="kpi-card-footer">
              <span class="kpi-card-delta up"><span data-icon="trendUp"></span> +1.3%</span>
            </div>
          </div>
        </div>

        <!-- Grid View -->
        <div id="driversGridView">
          <div class="driver-cards-grid" id="driversGrid"></div>
        </div>

        <!-- Table View -->
        <div id="driversTableView" style="display:none">
          <div class="glass-panel">
            <div class="data-table-wrapper">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Driver</th>
                    <th>Status</th>
                    <th>Rating</th>
                    <th>Trips</th>
                    <th>On-Time</th>
                    <th>License</th>
                    <th>Vehicle</th>
                    <th>Region</th>
                    <th>Joined</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="driversTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="src/icons.js"></script>
  <script src="src/mock-data.js"></script>
  <script src="src/charts.js"></script>
  <script src="src/app.js"></script>
  <script>
    initApp('Drivers', ['TransitOps', 'Drivers']);

    // Avatar colors by initial
    const avatarColors = [
      'linear-gradient(135deg, #6C5CE7, #8B7CF7)',
      'linear-gradient(135deg, #2DD4BF, #22C55E)',
      'linear-gradient(135deg, #F5A623, #FF5A5F)',
      'linear-gradient(135deg, #8B7CF7, #2DD4BF)',
      'linear-gradient(135deg, #FF5A5F, #F5A623)',
    ];

    function renderDriverCards() {
      const grid = document.getElementById('driversGrid');
      grid.innerHTML = MockData.drivers.map((d, i) => `
        <div class="driver-card" onclick="showToast('info', '${d.name}', 'Phone: ${d.phone} | License: ${d.license}')">
          <div class="avatar avatar-xl" style="background:${avatarColors[i % avatarColors.length]}">${d.avatar}</div>
          <div class="driver-card-name">${d.name}</div>
          ${statusPill(d.status)}
          <div class="driver-card-rating" style="margin-top:12px">
            <span class="driver-card-rating-value">${d.rating}</span>
            ${renderStars(Math.round(d.rating))}
          </div>
          <div class="driver-card-stats">
            <div>
              <div class="driver-card-stat-value">${d.trips.toLocaleString()}</div>
              <div class="driver-card-stat-label">Trips</div>
            </div>
            <div>
              <div class="driver-card-stat-value">${d.onTime}%</div>
              <div class="driver-card-stat-label">On-Time</div>
            </div>
            <div>
              <div class="driver-card-stat-value">${d.vehicle}</div>
              <div class="driver-card-stat-label">Vehicle</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderDriverTable() {
      const tbody = document.getElementById('driversTableBody');
      tbody.innerHTML = MockData.drivers.map((d, i) => `
        <tr>
          <td>
            <div class="driver-cell">
              <div class="avatar avatar-sm" style="background:${avatarColors[i % avatarColors.length]}">${d.avatar}</div>
              <div>
                <div class="font-semibold">${d.name}</div>
                <div class="text-xs text-tertiary">${d.id}</div>
              </div>
            </div>
          </td>
          <td>${statusPill(d.status)}</td>
          <td>
            <div class="flex items-center gap-2">
              <span class="font-semibold" style="color:var(--amber-400)">${d.rating}</span>
              ${renderStars(Math.round(d.rating))}
            </div>
          </td>
          <td class="tabular-nums">${d.trips.toLocaleString()}</td>
          <td class="tabular-nums font-semibold">${d.onTime}%</td>
          <td>${d.license}</td>
          <td class="tabular-nums">${d.vehicle}</td>
          <td>${d.region}</td>
          <td class="text-secondary">${d.joined}</td>
          <td><button class="row-action">${Icons.moreHorizontal}</button></td>
        </tr>
      `).join('');
    }

    renderDriverCards();
    renderDriverTable();

    // View toggle
    document.getElementById('viewToggle').querySelectorAll('.view-toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#viewToggle .view-toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const view = btn.dataset.view;
        document.getElementById('driversGridView').style.display = view === 'grid' ? '' : 'none';
        document.getElementById('driversTableView').style.display = view === 'table' ? '' : 'none';
      });
    });

    // Search
    document.getElementById('driverSearch').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      document.querySelectorAll('.driver-card').forEach(card => {
        card.style.display = card.textContent.toLowerCase().includes(query) ? '' : 'none';
      });
      document.querySelectorAll('#driversTableBody tr').forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(query) ? '' : 'none';
      });
    });
    // ── Trigger metric animations ──
    animateMetrics();
  </script>
</body>
</html>
